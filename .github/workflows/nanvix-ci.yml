name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - nanvix/**
  pull_request:
    branches:
      - nanvix/**
  workflow_dispatch:
  repository_dispatch:
    types: [nanvix-minor-release, nanvix-major-release, zlib-release]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: hyperlight
            process-mode: multi-process
            memory: 128mb
          - platform: hyperlight
            process-mode: single-process
            memory: 128mb
          - platform: microvm
            process-mode: single-process
            memory: 128mb
          - platform: microvm
            process-mode: multi-process
            memory: 128mb
          - platform: microvm
            process-mode: standalone
            memory: 128mb
    name: ${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
    container:
      image: nanvix/toolchain:latest-minimal
      options: --device /dev/kvm
    defaults:
      run:
        shell: bash
    env:
      NANVIX_MACHINE: ${{ matrix.platform }}
      NANVIX_DEPLOYMENT_MODE: ${{ matrix.process-mode }}
      NANVIX_MEMORY_SIZE: ${{ matrix.memory }}
      USER: runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL https://bootstrap.pypa.io/get-pip.py | python3 - --break-system-packages
          ./z setup

      - name: Install zlib dependency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SYSROOT=$(python3 -c "import json; print(json.load(open('.nanvix/env.json'))['NANVIX_SYSROOT'])")

          # Find the matching zlib release tag for this Nanvix SHA.
          NANVIX_SHA=$(python3 -c "import json; print(json.load(open('.nanvix/env.json')).get('NANVIX_TAG', 'latest'))")
          ZLIB_TAG=$(gh api repos/nanvix/zlib/releases --jq '.[0].tag_name' 2>/dev/null || echo "")
          if [[ -z "$ZLIB_TAG" ]]; then
            echo "::error::Could not find a zlib release"
            exit 1
          fi

          # Download and extract the matching zlib package.
          ZLIB_ASSET="zlib-${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}.tar.bz2"
          gh release download "$ZLIB_TAG" \
            --repo nanvix/zlib \
            --pattern "$ZLIB_ASSET" \
            --dir /tmp/zlib-download

          tar -xjf "/tmp/zlib-download/$ZLIB_ASSET" -C /tmp/zlib-extracted 2>/dev/null || {
            mkdir -p /tmp/zlib-extracted
            tar -xjf "/tmp/zlib-download/$ZLIB_ASSET" -C /tmp/zlib-extracted
          }

          # Install zlib into the sysroot.
          cp -rf /tmp/zlib-extracted/sysroot/* "$SYSROOT/"
          echo "Installed zlib from $ZLIB_TAG into $SYSROOT"
          ls -la "$SYSROOT/lib/libz.a"

      - name: Build
        run: ./z build

      - name: Test
        if: matrix.process-mode != 'standalone'
        run: ./z test

      - name: Test (standalone — smoke + integration only)
        if: matrix.process-mode == 'standalone'
        run: ./z test -- test-smoke test-integration

      - name: Release
        if: success()
        run: ./z release

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
          path: dist/*.tar.bz2
          retention-days: 7

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-logs
          cp -f /tmp/*.log ci-logs/ 2>/dev/null || true
          find .nanvix -type f -name "*.log" -exec cp -f {} ci-logs/ \; 2>/dev/null || true
          ls -lah ci-logs || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.platform }}-${{ matrix.process-mode }}
          path: ci-logs/*
          if-no-files-found: warn

  release:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: sqlite-*

      - name: Prepare Release Assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release-artifacts -name "*.tar.bz2" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Get Nanvix Release Info
        id: nanvix-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Verify we have release assets.
          ASSET_COUNT=$(find release-assets -name "*.tar.bz2" 2>/dev/null | wc -l)
          if [[ "$ASSET_COUNT" -eq 0 ]]; then
            echo "::error::No release assets found in release-assets/"
            exit 1
          fi

          # Get Nanvix release metadata and SHA from the API.
          API_URL="https://api.github.com/repos/nanvix/nanvix/releases/tags/latest"
          RELEASE_INFO=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$API_URL")
          NANVIX_NAME=$(echo "$RELEASE_INFO" | jq -r '.name // "latest"')
          NANVIX_PUBLISHED=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          NANVIX_SHA_FULL=$(echo "$RELEASE_INFO" | jq -r '.target_commitish // "unknown"')
          NANVIX_SHA="${NANVIX_SHA_FULL::7}"

          echo "name=${NANVIX_NAME}" >> "$GITHUB_OUTPUT"
          echo "published=${NANVIX_PUBLISHED}" >> "$GITHUB_OUTPUT"
          echo "sha=${NANVIX_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_full=${NANVIX_SHA_FULL}" >> "$GITHUB_OUTPUT"

      - name: Get zlib Release Info
        id: zlib-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZLIB_TAG=$(gh api repos/nanvix/zlib/releases --jq '.[0].tag_name' 2>/dev/null || echo "unknown")
          echo "tag=${ZLIB_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NANVIX_NAME: ${{ steps.nanvix-release.outputs.name }}
          NANVIX_PUBLISHED: ${{ steps.nanvix-release.outputs.published }}
          NANVIX_SHA: ${{ steps.nanvix-release.outputs.sha }}
          NANVIX_SHA_FULL: ${{ steps.nanvix-release.outputs.sha_full }}
          ZLIB_TAG: ${{ steps.zlib-release.outputs.tag }}
        run: |
          RELEASE_TAG="${GITHUB_SHA::7}-nanvix-${NANVIX_SHA}"
          if gh release view "$RELEASE_TAG" &>/dev/null; then
            gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          fi
          gh release create "$RELEASE_TAG" \
            --title "Build ${GITHUB_SHA::7}" \
            --notes "Automated build from branch ${{ github.ref_name }} at commit ${{ github.sha }}.

          **Build Information:**
          - Workflow Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Commit: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          **Nanvix Release:**
          - Name: ${NANVIX_NAME}
          - Published: ${NANVIX_PUBLISHED}
          - Commit: [${NANVIX_SHA_FULL}](https://github.com/nanvix/nanvix/commit/${NANVIX_SHA_FULL})

          **Package Layout:**
          \`\`\`
          sysroot/
            lib/libsqlite3.a
            include/sqlite3.h
            bin/{sqlite3.elf,speedtest1.elf}
          \`\`\`

          **Dependencies:** zlib (${ZLIB_TAG})" \
            --latest \
            release-assets/*.tar.bz2

      - name: Trigger Dependent Workflows
        if: success()
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          RELEASE_TAG="${GITHUB_SHA::7}-nanvix-${{ steps.nanvix-release.outputs.sha }}"
          echo "Triggering cpython workflow..."
          gh api repos/nanvix/cpython/dispatches \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f event_type="sqlite-release" \
            -f "client_payload[nanvix_sha]=${{ steps.nanvix-release.outputs.sha }}" \
            -f "client_payload[sqlite_tag]=${RELEASE_TAG}" || echo "::warning::Failed to trigger cpython workflow"

  report-failure:
    needs: [build]
    if: >-
      ${{ always() &&
          (github.event_name == 'repository_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') &&
          needs.build.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure (run ${context.runNumber})`,
              body: `The SQLite CI workflow failed.\n- Trigger: ${context.eventName}\n- Run: [#${context.runNumber}](${runUrl})\n- SHA: ${context.sha}\n- build: ${process.env.BUILD_RESULT}\n\nPlease investigate.`,
              assignees: ['ppenna']
            });
