name: Nanvix CI

on:
  schedule:
    - cron: "50 16 * * *"
  push:
    branches: ["nanvix/**"]
  pull_request:
    branches: ["nanvix/**"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'schedule'
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.4.0
    with:
      zutil-version: "v0.7.3"
      memory-sizes: '["128mb","256mb"]'
      caller-event-name: ${{ github.event_name }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  ci-scheduled:
    if: github.event_name == 'schedule'
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.4.0
    with:
      zutil-version: "v0.7.3"
      memory-sizes: '["128mb","256mb"]'
      caller-event-name: ${{ github.event_name }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
