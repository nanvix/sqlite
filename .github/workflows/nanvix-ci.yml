name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - nanvix/**
  pull_request:
    branches:
      - nanvix/**
  workflow_dispatch:
  repository_dispatch:
    types: [zlib-release, nanvix-minor-release, nanvix-major-release]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [hyperlight, microvm]
        process-mode: [multi-process, single-process, standalone]
        memory: [128mb]
    name: ${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
    container:
      image: nanvix/toolchain:latest-minimal
      options: --device /dev/kvm
    defaults:
      run:
        shell: bash
    env:
      NANVIX_MACHINE: ${{ matrix.platform }}
      NANVIX_DEPLOYMENT_MODE: ${{ matrix.process-mode }}
      NANVIX_MEMORY_SIZE: ${{ matrix.memory }}
      USER: runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apt-get update -qq && apt-get install -y -qq python3-pip
          pip install --quiet --break-system-packages \
            "nanvix_zutil @ https://github.com/nanvix/zutils/releases/download/v0.2.2/nanvix_zutil-0.2.2-py3-none-any.whl"
          python3 .nanvix/z.py setup

      - name: Build
        run: python3 .nanvix/z.py build

      - name: Test
        if: matrix.process-mode != 'standalone'
        run: python3 .nanvix/z.py test

      - name: Test (standalone — smoke + integration only)
        if: matrix.process-mode == 'standalone'
        run: python3 .nanvix/z.py test -- test-smoke test-integration

      - name: Release
        if: success()
        run: python3 .nanvix/z.py release

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
          path: dist/*.tar.bz2
          retention-days: 7

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-logs
          cp -f /tmp/*.log ci-logs/ 2>/dev/null || true
          find .nanvix -type f -name "*.log" -exec cp -f {} ci-logs/ \; 2>/dev/null || true
          ls -lah ci-logs || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.platform }}-${{ matrix.process-mode }}
          path: ci-logs/*
          if-no-files-found: warn

  release:
    needs: [build]
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        id: download-artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-artifacts
          pattern: sqlite-*

      - name: Prepare Release Assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [[ "${{ steps.download-artifacts.outcome }}" == "failure" ]]; then
            echo "::warning::Artifact download step failed — this may indicate an API or network issue"
          fi
          find release-artifacts -name "*.tar.bz2" -exec cp {} release-assets/ \; 2>/dev/null || true
          ASSET_COUNT=$(find release-assets -name "*.tar.bz2" 2>/dev/null | wc -l)
          echo "Found $ASSET_COUNT release asset(s)"
          if [[ "$ASSET_COUNT" -eq 0 ]]; then
            echo "::error::No release assets found — all matrix builds may have failed or artifact retrieval encountered an error"
            exit 1
          fi
          ls -la release-assets/

      - name: Get Nanvix Release Info
        id: nanvix-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get Nanvix release metadata and SHA from the API.
          API_URL="https://api.github.com/repos/nanvix/nanvix/releases/tags/latest"
          RELEASE_INFO=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$API_URL")
          NANVIX_NAME=$(echo "$RELEASE_INFO" | jq -r '.name // "latest"')
          NANVIX_PUBLISHED=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          NANVIX_TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name // empty')
          NANVIX_TARGET=$(echo "$RELEASE_INFO" | jq -r '.target_commitish // empty')

          # Resolve release ref to a full commit SHA.
          REF="${NANVIX_TAG:-$NANVIX_TARGET}"
          if [[ -z "$REF" ]]; then
            echo "::error::Unable to determine Nanvix release ref"
            exit 1
          fi

          if [[ "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            NANVIX_SHA_FULL="$REF"
          else
            COMMIT_API_URL="https://api.github.com/repos/nanvix/nanvix/commits/${REF}"
            NANVIX_SHA_FULL=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$COMMIT_API_URL" | jq -r '.sha // empty')
          fi

          if [[ -z "$NANVIX_SHA_FULL" || ! "$NANVIX_SHA_FULL" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Failed to resolve Nanvix ref '${REF}' to a commit SHA"
            exit 1
          fi

          NANVIX_SHA="${NANVIX_SHA_FULL::7}"

          echo "name=${NANVIX_NAME}" >> "$GITHUB_OUTPUT"
          echo "published=${NANVIX_PUBLISHED}" >> "$GITHUB_OUTPUT"
          echo "sha=${NANVIX_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_full=${NANVIX_SHA_FULL}" >> "$GITHUB_OUTPUT"

      - name: Read Package Version
        id: pkg-version
        run: |
          SQLITE_VERSION=$(cat VERSION)
          echo "sqlite_version=${SQLITE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NANVIX_NAME: ${{ steps.nanvix-release.outputs.name }}
          NANVIX_PUBLISHED: ${{ steps.nanvix-release.outputs.published }}
          NANVIX_SHA: ${{ steps.nanvix-release.outputs.sha }}
          NANVIX_SHA_FULL: ${{ steps.nanvix-release.outputs.sha_full }}
          SQLITE_VERSION: ${{ steps.pkg-version.outputs.sqlite_version }}
        run: |
          set -euo pipefail

          PRIMARY_TAG="${SQLITE_VERSION}-nanvix-${NANVIX_NAME}"
          SECONDARY_TAG="${SQLITE_VERSION}-nanvix-${NANVIX_SHA}"
          RELEASE_TITLE="sqlite ${SQLITE_VERSION} for Nanvix ${NANVIX_NAME}"

          # Idempotency guard: skip if the commitish release already exists.
          if gh release view "${SECONDARY_TAG}" &>/dev/null; then
            echo "Release ${SECONDARY_TAG} already exists — skipping."
            echo "RELEASE_TAG=${SECONDARY_TAG}" >> "$GITHUB_ENV"
            exit 0
          fi

          # Create secondary (commitish) release.
          gh release create "${SECONDARY_TAG}" \
            --title "${RELEASE_TITLE}" \
            --notes "Automated build from branch ${{ github.ref_name }} at commit ${{ github.sha }}.

          **Build Information:**
          - Workflow Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Commit: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          **Nanvix Release:**
          - Name: ${NANVIX_NAME}
          - Published: ${NANVIX_PUBLISHED}
          - Commit: [${NANVIX_SHA_FULL}](https://github.com/nanvix/nanvix/commit/${NANVIX_SHA_FULL})

          **Package Layout:**
          \`\`\`
          sysroot/
            lib/libsqlite3.a
            include/sqlite3.h
            bin/sqlite3.elf
          \`\`\`

          **Dependencies:** zlib (resolved via nanvix.lock)" \
            release-assets/*.tar.bz2

          # Create primary (semver) release if it doesn't exist yet.
          if ! gh release view "${PRIMARY_TAG}" &>/dev/null; then
            gh release create "${PRIMARY_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes "Stable release: sqlite ${SQLITE_VERSION} for Nanvix ${NANVIX_NAME}.

          See [${SECONDARY_TAG}](https://github.com/${{ github.repository }}/releases/tag/${SECONDARY_TAG}) for full build details." \
              --latest \
              release-assets/*.tar.bz2
          fi

          echo "RELEASE_TAG=${SECONDARY_TAG}" >> "$GITHUB_ENV"

      - name: Trigger Dependent Workflows
        if: success()
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          NANVIX_SHA: ${{ steps.nanvix-release.outputs.sha }}
          NANVIX_NAME: ${{ steps.nanvix-release.outputs.name }}
          SQLITE_VERSION: ${{ steps.pkg-version.outputs.sqlite_version }}
        run: |
          SECONDARY_TAG="${SQLITE_VERSION}-nanvix-${NANVIX_SHA}"
          echo "Triggering cpython workflow..."
          gh api repos/nanvix/cpython/dispatches \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f event_type="sqlite-release" \
            -f "client_payload[nanvix_sha]=${NANVIX_SHA}" \
            -f "client_payload[nanvix_version]=${NANVIX_NAME}" \
            -f "client_payload[sqlite_tag]=${SECONDARY_TAG}" || echo "::warning::Failed to trigger cpython workflow"

  report-failure:
    needs: [build, release]
    if: >-
      ${{ always() &&
          (github.event_name == 'repository_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') &&
          needs.build.result == 'failure' &&
          needs.release.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report failure issue
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `CI failure`;
            const body = [
              `The SQLite CI workflow failed.`,
              `- Trigger: ${context.eventName}`,
              `- Run: [#${context.runNumber}](${runUrl})`,
              `- SHA: ${context.sha}`,
              `- build: ${process.env.BUILD_RESULT}`,
              '',
              'Please investigate and take any corrective actions.'
            ].join('\n');

            const { data: search } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "CI failure"`
            });
            const existing = search.items.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              const currentAssignees = existing.assignees.map(a => a.login);
              const desired = ['ppenna'];
              const missing = desired.filter(a => !currentAssignees.includes(a));
              if (missing.length > 0) {
                await github.rest.issues.addAssignees({ owner, repo, issue_number: existing.number, assignees: missing });
              }
            } else {
              await github.rest.issues.create({ owner, repo, title, body, assignees: ['ppenna'] });
            }
